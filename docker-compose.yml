services:
  postgres:
    image: postgres:16
    container_name: resumebuilder-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: resumebuilder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d resumebuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: resumebuilder-api
    working_dir: /src/API
    command: ["dotnet", "run", "--project", "/src/API/API.csproj", "--urls", "http://0.0.0.0:5003"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=resumebuilder;Username=devuser;Password=devpassword123
      Jwt__Key: ResumeBuilderDevKey_ChangeThisBeforeProduction_123456789
      Jwt__Issuer: ResumeApp.API
      Jwt__Audience: ResumeApp.Mobile
      Jwt__ExpirationInMinutes: 120
    ports:
      - "5003:5003"
    volumes:
      - ./:/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
 
volumes:
  pgdata:
 
