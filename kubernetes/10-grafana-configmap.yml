apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: resumeapp
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false
      - name: Loki
        uid: Loki
        type: loki
        access: proxy
        url: http://loki-service:3100
        editable: false

  provider.yaml: |
    apiVersion: 1
    providers:
      - name: ResumeApp
        orgId: 1
        folder: ResumeApp
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
