apiVersion: apps/v1
kind: Deployment
metadata:
  name: resumeapp-it-postgres
  namespace: ${INTEGRATION_TEST_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resumeapp-it-postgres
  template:
    metadata:
      labels:
        app: resumeapp-it-postgres
    spec:
      containers:
        - name: resumeapp-it-postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: resumeapp-it-postgres-secrets
          startupProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            initialDelaySeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            initialDelaySeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
