apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config-configmap
  namespace: resumeapp
data:
  grafana-dashboard.json: |
    {
      "id": null,
      "uid": "resumeapp-observability",
      "title": "ResumeApp Observability",
      "tags": ["resumeapp"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "HTTP - Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "rate(http_server_request_duration_seconds_count[1m])",
              "legendFormat": "{{http_request_method}} {{http_route}} {{http_response_status_code}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 2,
          "title": "HTTP - P99 / P50 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, http_route))",
              "legendFormat": "P99 {{http_route}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, http_route))",
              "legendFormat": "P50 {{http_route}}",
              "refId": "B"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 3,
          "title": "HTTP - Active In-Flight Requests",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "sum(http_server_active_requests)", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "HTTP - Error Rate (4xx / 5xx)",
          "type": "timeseries",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"4..\"}[1m]))",
              "legendFormat": "4xx",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[1m]))",
              "legendFormat": "5xx",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "5xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }] },
              { "matcher": { "id": "byName", "options": "4xx" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }] }
            ]
          }
        },
        {
          "id": 5,
          "title": "HTTP - Request Rate by Route",
          "type": "bargauge",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count[5m])) by (http_route)",
              "legendFormat": "{{http_route}}",
              "refId": "A"
            }
          ],
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 6,
          "title": "Auth - Registration Rate",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "rate(resumeapp_auth_registrations_total[5m])",
              "legendFormat": "{{result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 7,
          "title": "Auth - Login Attempts",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "rate(resumeapp_auth_login_attempts_total[5m])",
              "legendFormat": "{{result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 8,
          "title": "Auth - OTP Verifications",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "rate(resumeapp_auth_otp_verifications_total[5m])",
              "legendFormat": "{{result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 9,
          "title": "Auth - Social Logins by Provider",
          "type": "bargauge",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "expr": "sum(rate(resumeapp_auth_social_logins_total[5m])) by (provider)",
              "legendFormat": "{{provider}}",
              "refId": "A"
            }
          ],
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 10,
          "title": "Data - Resume Entries Created",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            { "expr": "rate(resumeapp_data_educations_created_total[5m])", "legendFormat": "educations", "refId": "A" },
            { "expr": "rate(resumeapp_data_experiences_created_total[5m])", "legendFormat": "experiences", "refId": "B" },
            { "expr": "rate(resumeapp_data_skills_created_total[5m])", "legendFormat": "skills", "refId": "C" },
            { "expr": "rate(resumeapp_data_projects_created_total[5m])", "legendFormat": "projects", "refId": "D" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 11,
          "title": "Application Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "loki", "uid": "Loki" },
          "targets": [
            { "expr": "{service_name=\"ResumeApp.API\"}", "refId": "A" }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        }
      ]
    }
