apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config-configmap
  namespace: resumeapp
data:
  grafana-dashboard.json: |
    {
      "title": "ResumeApp Dashboard",
      "panels": [
        {
          "type": "graph",
          "title": "Requests / Metrics",
          "targets": [
            {
              "expr": "otelcol_receiver_accepted_metric_points",
              "legendFormat": "metrics"
            }
          ]
        }
      ],
      "schemaVersion": 36,
      "version": 1
    }