apiVersion: apps/v1
kind: Deployment
metadata:
  name: resumeapp-api
  namespace: $PR_NAMESPACE
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 5
  selector:
    matchLabels:
      app: resumeapp-api
  template:
    metadata:
      labels:
        app: resumeapp-api
    spec:
      containers:
        - name: resumeapp-api
          image: paulawenighofer/resumeapp:$IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "1"
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-service:4317
            - name: OTEL_SERVICE_NAME
              value: ResumeApp
            - name: FeatureFlags__EmailOtpDelivery
              value: "${FEATURES_EMAIL_OTP_DELIVERY}"
            - name: AzureBlob__ConnectionString
              value: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-service:10000/devstoreaccount1;"
            - name: AzureBlob__ProfileImagesContainer
              value: profile-images
            - name: AzureBlob__ProfileImagesBasePath
              value: ""
          envFrom:
            - secretRef:
                name: $PR_NAMESPACE-secrets
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 5
            initialDelaySeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 10
            initialDelaySeconds: 15
            failureThreshold: 3
