apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: $PR_NAMESPACE
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector-service:8889']
        scrape_interval: 5s
