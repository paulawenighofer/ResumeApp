name: PR Environment Building/Destroying Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-pr-environment:
    name: Deploy PR Environment
    runs-on: self-hosted
    if: github.event.action != 'closed'
    env:
      FEATURES_EMAIL_OTP_DELIVERY: ${{ vars.STAGING_FEATURES_EMAIL_OTP_DELIVERY }}
      AI_SERVICE_BASE_URL: ${{ vars.STAGING_AI_SERVICE_BASEURL }}
      AI_SERVICE_MODEL: ${{ vars.STAGING_AI_SERVICE_MODEL }}
      AI_SERVICE_TIMEOUT_SECONDS: ${{ vars.STAGING_AI_SERVICE_TIMEOUTSECONDS }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_NAMESPACE: resumeapp-pr-${{ github.event.pull_request.number }}
      PR_HOSTNAME: pr-${{ github.event.pull_request.number }}.${{ vars.STAGING_APP_DOMAIN }}
      PR_GRAFANA_HOST: pr-${{ github.event.pull_request.number }}-grafana.${{ vars.STAGING_APP_DOMAIN }}
      PR_PROMETHEUS_HOST: pr-${{ github.event.pull_request.number }}-prometheus.${{ vars.STAGING_APP_DOMAIN }}
      PR_WEB_HOST: pr-${{ github.event.pull_request.number }}-web.${{ vars.STAGING_APP_DOMAIN }}
      IMAGE_TAG: pr-${{ github.event.pull_request.number }}
      KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
      INTEGRATION_TEST_NAMESPACE: resumeapp-it-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      POSTGRES_DB: integrationtestdb

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Linting
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 \
           --run "dotnet restore API/API.csproj && dotnet restore IntegrationTests/IntegrationTests.csproj && dotnet format API/API.csproj --verify-no-changes --no-restore && dotnet format IntegrationTests/IntegrationTests.csproj --verify-no-changes --no-restore"

      - name: MAUI Tests
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 \
           --run "dotnet test 'Maui Tests/Maui Tests.csproj' -p:MauiTestBuild=true"

      - name: Create integration test database
        run: |
          for file in ./kubernetes/integration-template/{0,1,2,3}-*.yml; do
            cat "$file" | envsubst | kubectl apply -f -
          done
          kubectl rollout status deployment/resumeapp-it-postgres -n ${INTEGRATION_TEST_NAMESPACE} --timeout=300s

      - name: Integration Tests
        run: |
          kubectl port-forward svc/resumeapp-it-postgres 15432:5432 -n ${INTEGRATION_TEST_NAMESPACE} &
          sleep 3
          export INTEGRATION_TEST_DB_CONNECTION="Host=localhost;Port=15432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
          nix-shell -p dotnetCorePackages.sdk_9_0 --run "dotnet test IntegrationTests/IntegrationTests.csproj"

      - name: Cleanup integration environment
        if: always()
        run: kubectl delete namespace ${INTEGRATION_TEST_NAMESPACE} --ignore-not-found=true

      - name: Build and push PR Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/resumeapp:$IMAGE_TAG .
          docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp:$IMAGE_TAG

      - name: Build and push PR Web Docker image
        run: |
          docker build -f Dockerfile.web -t ${{ secrets.DOCKER_USERNAME }}/resumeapp-web:$IMAGE_TAG .
          docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp-web:$IMAGE_TAG

      - name: Apply namespace
        run: |
          cat kubernetes/pr-template/0-namespace.yml | envsubst | kubectl apply -f -

      - name: Copy TLS secret to PR namespace
        run: |
          kubectl get secret resumeapp-tls -n resumeapp -o jsonpath='{.data.tls\.crt}' \
            | base64 -d > /tmp/pr-tls.crt
          kubectl get secret resumeapp-tls -n resumeapp -o jsonpath='{.data.tls\.key}' \
            | base64 -d > /tmp/pr-tls.key
          kubectl create secret tls resumeapp-tls \
            --cert=/tmp/pr-tls.crt \
            --key=/tmp/pr-tls.key \
            --namespace=${PR_NAMESPACE} \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/pr-tls.crt /tmp/pr-tls.key

      - name: Create Kubernetes secret
        run: |
          PR_DB_CONNECTION="Host=resumeapp-postgres-service;Port=5432;Database=${{ secrets.POSTGRES_DB }};Username=${{ secrets.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}"
          kubectl create secret generic ${PR_NAMESPACE}-secrets \
            --namespace=${PR_NAMESPACE} \
            --from-literal=ConnectionStrings__DefaultConnection="${PR_DB_CONNECTION}" \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpirationInMinutes="${{ vars.STAGING_JWT_EXPIRATION_MINUTES }}" \
            --from-literal=Google__ClientId="${{ secrets.GOOGLE__CLIENTID }}" \
            --from-literal=Google__ClientSecret="${{ secrets.GOOGLE__CLIENTSECRET }}" \
            --from-literal=LinkedIn__ClientId="${{ secrets.LINKEDIN__CLIENTID }}" \
            --from-literal=LinkedIn__ClientSecret="${{ secrets.LINKEDIN__CLIENTSECRET }}" \
            --from-literal=GitHub__ClientId="${{ secrets.GH_CLIENT_ID }}" \
            --from-literal=GitHub__ClientSecret="${{ secrets.GH_CLIENT_SECRET }}" \
            --from-literal=AppScheme="${{ vars.STAGING_APP_SCHEME }}" \
            --from-literal=ApiBaseUrl="https://${PR_HOSTNAME}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --from-literal=Smtp__Username="${{ secrets.SMTP_USERNAME }}" \
            --from-literal=Smtp__Password="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=AzureBlob__ConnectionString="${{ secrets.AZURE_BLOB_CONNECTION_STRING }}" \
            --from-literal=AzureBlob__ProfileImagesContainer="${{ vars.STAGING_AZURE_BLOB_PROFILES_CONTAINER }}" \
            --from-literal=AzureBlob__ProfileImagesBasePath="${{ vars.STAGING_AZURE_BLOB_PROFILES_BASE_PATH }}" \
            --from-literal=AiService__BaseUrl="${AI_SERVICE_BASE_URL}" \
            --from-literal=AiService__ApiKey="${{ secrets.AI_SERVICE_APIKEY }}" \
            --from-literal=AiService__Model="${AI_SERVICE_MODEL}" \
            --from-literal=AiService__TimeoutSeconds="${AI_SERVICE_TIMEOUT_SECONDS:-1200}" \
            --from-literal=OAuthCallbackBaseUrl="https://${{ vars.STAGING_APP_DOMAIN }}" \
            --from-literal=StagingAppDomain="${{ vars.STAGING_APP_DOMAIN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PR manifests
        run: |
          for file in ./kubernetes/pr-template/*.yml; do
            echo "$file"
            cat "$file" | envsubst | kubectl apply -f -
          done

      - name: Update Grafana dashboard configmap
        run: |
          kubectl delete -n ${PR_NAMESPACE} configmap grafana-dashboard-config-configmap || true
          kubectl create -n ${PR_NAMESPACE} configmap grafana-dashboard-config-configmap --from-file=configs/grafana-dashboard.json

      - name: Wait for PostgreSQL to be ready
        run: |
          kubectl rollout status deployment/resumeapp-postgres -n ${PR_NAMESPACE} --timeout=300s

      - name: Measure API deployment downtime
        run: |
          ARTIFACT_DIR="${RUNNER_TEMP}/deployment-observability/pr-api"
          RAW_K6_LOG="${ARTIFACT_DIR}/resumeapp-api-k6-raw.ndjson"
          PROCESSED_K6_LOG="${ARTIFACT_DIR}/resumeapp-api-k6-events.ndjson"
          SUMMARY_JSON="${ARTIFACT_DIR}/resumeapp-api-deployment-summary.json"
          DEPLOYMENT_ID="pr-${PR_NUMBER}-${GITHUB_SHA}"
          TARGET_URL="https://${PR_HOSTNAME}/health/ready"
          LOKI_PORT=3110

          mkdir -p "${ARTIFACT_DIR}"

          set +e
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TARGET_URL="${TARGET_URL}" \
            -e DEPLOYMENT_ID="${DEPLOYMENT_ID}" \
            -e ENVIRONMENT="pr" \
            -e SERVICE_NAME="resumeapp-api" \
            -e WORKFLOW_NAME="${GITHUB_WORKFLOW}" \
            -e RUN_ID="${GITHUB_RUN_ID}" \
            -e PROBE_INTERVAL_MS="100" \
            -e MAX_DURATION="10m" \
            grafana/k6:0.49.0 run --quiet --no-summary /work/scripts/observability/deployment-uptime.js \
            > "${RAW_K6_LOG}" 2>&1 &
          K6_PID=$!

          sleep 2

          kubectl rollout restart deployment/resumeapp-api -n ${PR_NAMESPACE}
          kubectl rollout status deployment/resumeapp-api -n ${PR_NAMESPACE} --timeout=300s
          ROLLOUT_STATUS=$?

          kill -TERM ${K6_PID} 2>/dev/null || true
          wait ${K6_PID} 2>/dev/null
          K6_STATUS=$?
          set -e

          echo "k6 exit code: ${K6_STATUS}"

          kubectl port-forward svc/loki-service "${LOKI_PORT}:3100" -n ${PR_NAMESPACE} > "${ARTIFACT_DIR}/loki-port-forward.log" 2>&1 &
          PORT_FORWARD_PID=$!
          sleep 5

          set +e
          nix-shell -p python3 --run "python3 scripts/observability/prepare_and_push_deployment_logs.py --input '${RAW_K6_LOG}' --output '${PROCESSED_K6_LOG}' --summary-output '${SUMMARY_JSON}' --deployment-id '${DEPLOYMENT_ID}' --environment 'pr' --service 'resumeapp-api' --workflow '${GITHUB_WORKFLOW}' --run-id '${GITHUB_RUN_ID}' --target-url '${TARGET_URL}' --probe-interval-ms 100 --loki-url 'http://127.0.0.1:${LOKI_PORT}/loki/api/v1/push'"
          PREP_STATUS=$?
          kill -TERM ${PORT_FORWARD_PID} 2>/dev/null || true
          wait ${PORT_FORWARD_PID} 2>/dev/null || true
          set -e

          if [ ${PREP_STATUS} -ne 0 ]; then
            echo "::warning::Failed to process or push PR deployment downtime logs to Loki."
          fi

          if [ -f "${SUMMARY_JSON}" ]; then
            cat "${SUMMARY_JSON}"
          fi

          if [ ${ROLLOUT_STATUS} -ne 0 ]; then
            exit ${ROLLOUT_STATUS}
          fi

      - name: Upload PR API deployment observability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-api-deployment-observability-${{ github.event.pull_request.number }}
          path: |
            ${{ runner.temp }}/deployment-observability/pr-api/resumeapp-api-k6-raw.ndjson
            ${{ runner.temp }}/deployment-observability/pr-api/resumeapp-api-k6-events.ndjson
            ${{ runner.temp }}/deployment-observability/pr-api/resumeapp-api-deployment-summary.json
            ${{ runner.temp }}/deployment-observability/pr-api/loki-port-forward.log

      - name: Restart Web to pull new image
        run: |
          kubectl rollout restart deployment/resumeapp-web -n ${PR_NAMESPACE}
          kubectl rollout status deployment/resumeapp-web -n ${PR_NAMESPACE} --timeout=300s

      - name: Debug rollout on failure
        if: failure()
        run: |
          kubectl get pods -n ${PR_NAMESPACE} -o wide
          kubectl describe deployment resumeapp-api -n ${PR_NAMESPACE}
          kubectl describe pods -n ${PR_NAMESPACE} -l app=resumeapp-api

      - name: Restart observability pods to pick up new configmaps
        run: |
          kubectl rollout restart deployment/prometheus -n ${PR_NAMESPACE}
          kubectl rollout restart deployment/grafana -n ${PR_NAMESPACE}
          kubectl rollout restart deployment/otel-collector -n ${PR_NAMESPACE}

      - name: Echo PR environment URLs
        run: |
          echo "=========================================="
          echo "  PR Environment URLs"
          echo "=========================================="
          echo "  API:        https://${PR_HOSTNAME}"
          echo "  Web:        https://${PR_WEB_HOST}"
          echo "  Grafana:    https://${PR_GRAFANA_HOST}"
          echo "  Prometheus: https://${PR_PROMETHEUS_HOST}"
          echo "  Namespace:  ${PR_NAMESPACE}"
          echo "  PR:         ${{ github.event.pull_request.html_url }}"
          echo "======================================"

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          MARKER="<!-- pr-env-bot -->"
          COMMENT_BODY="${MARKER}
          ### PR Environment Deployed

          | Service | URL |
          |---|---|
          | API | https://${PR_HOSTNAME} |
          | Web | https://${PR_WEB_HOST} |
          | Grafana | https://${PR_GRAFANA_HOST} |
          | Prometheus | https://${PR_PROMETHEUS_HOST} |

          **Namespace:** \`${PR_NAMESPACE}\`
          **Commit:** \`${{ github.event.pull_request.head.sha }}\`
          _Updated: $(date -u '+%Y-%m-%d %H:%M UTC')_"

          EXISTING_COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api --method PATCH \
              repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID} \
              -f body="$COMMENT_BODY" \
              --silent
            echo "Updated comment: ${{ github.event.pull_request.html_url }}#issuecomment-${EXISTING_COMMENT_ID}"
          else
            NEW_COMMENT_ID=$(gh api \
              --method POST \
              repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
              -f body="$COMMENT_BODY" \
              --jq ".id")
            echo "Created comment: ${{ github.event.pull_request.html_url }}#issuecomment-${NEW_COMMENT_ID}"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "PR #${PR_NUMBER} environment deployment failed" ${{ vars.STAGING_NTFY_TOPIC_URL }}

  cleanup-pr-environment:
    name: Cleanup PR Environment
    runs-on: self-hosted
    if: github.event.action == 'closed'
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_NAMESPACE: resumeapp-pr-${{ github.event.pull_request.number }}
      IMAGE_TAG: pr-${{ github.event.pull_request.number }}
      KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}

    steps:
      - name: Delete Kubernetes namespace
        run: |
          kubectl delete namespace ${PR_NAMESPACE} --ignore-not-found=true
          echo "Triggered deletion of namespace ${PR_NAMESPACE}"

      - name: Wait for namespace to be fully terminated
        run: |
          kubectl wait --for=delete namespace/${PR_NAMESPACE} --timeout=60s || true
          echo "Namespace ${PR_NAMESPACE} fully terminated"

      - name: Delete Docker Hub image tag
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.DOCKER_USERNAME }}\",\"password\":\"${{ secrets.DOCKER_TOKEN }}\"}" \
            https://hub.docker.com/v2/users/login/ | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -s -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/resumeapp/tags/${IMAGE_TAG}/"
          echo "Deleted Docker Hub image tag ${IMAGE_TAG}"

      - name: Delete Web Docker Hub image tag
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.DOCKER_USERNAME }}\",\"password\":\"${{ secrets.DOCKER_TOKEN }}\"}" \
            https://hub.docker.com/v2/users/login/ | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -s -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/resumeapp-web/tags/${IMAGE_TAG}/"
          echo "Deleted Docker Hub web image tag ${IMAGE_TAG}"

      - name: Post cleanup comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh pr comment ${PR_NUMBER} \
            --repo ${{ github.repository }} \
            --body "PR environment \`${PR_NAMESPACE}\` has been torn down. All Kubernetes resources and Docker image \`${IMAGE_TAG}\` deleted."

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "PR #${PR_NUMBER} environment cleanup failed" ${{ vars.STAGING_NTFY_TOPIC_URL }}
