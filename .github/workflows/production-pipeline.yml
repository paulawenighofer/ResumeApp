name: Pipeline for Building on Production
on:
  push:
    branches:
        - production
  workflow_dispatch:

jobs:
  build-and-deploy-on-azure:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      FEATURES_EMAIL_OTP_DELIVERY: ${{ vars.PRODUCTION_FEATURES_EMAIL_OTP_DELIVERY }}
      AI_SERVICE_BASE_URL: ${{ vars.PRODUCTION_AI_SERVICE_BASEURL }}
      AI_SERVICE_MODEL: ${{ vars.PRODUCTION_AI_SERVICE_MODEL }}
      AI_SERVICE_TIMEOUT_SECONDS: ${{ vars.PRODUCTION_AI_SERVICE_TIMEOUTSECONDS }}
      AI_SERVICE_API_KEY: ${{ secrets.PRODUCTION_AI_SERVICE_APIKEY }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/resumeapp:prod-${{ github.run_number }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp:prod-${{ github.run_number }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/resumeapp:prod-${{ github.run_number }}

      - name: Apply production feature flags
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars FeatureFlags__EmailOtpDelivery="${FEATURES_EMAIL_OTP_DELIVERY:-true}" AiService__BaseUrl="${AI_SERVICE_BASE_URL}" AiService__ApiKey="${AI_SERVICE_API_KEY}" AiService__Model="${AI_SERVICE_MODEL}" AiService__TimeoutSeconds="${AI_SERVICE_TIMEOUT_SECONDS:-60}"
            


      - name: Notify on failure
        if: failure()
        run: |
          curl -d "Production Deployment on Azure Failed for Resume APP - Please fix it" ntfy.sh/resume-app-pb
