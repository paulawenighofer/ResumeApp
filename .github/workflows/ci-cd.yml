name: pipelines for alex's kubernetes hosting
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  Kube-deploy:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
 
      - name: linting
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 \
           --run "dotnet format --verify-no-changes"
 
      - name: testing
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 \
           --run "dotnet test"
 
      - name: Building and Pushing to Docker Hub
        run: |
            docker build -t paulawenighofer/resumeapp:$GITHUB_RUN_NUMBER .
            docker push paulawenighofer/resumeapp:$GITHUB_RUN_NUMBER
 
      - name: kubectl stuff
        run: |
          pwd
 
          for file in ./kubernetes/*.yml; do
            echo "$file"
            cat "$file" | envsubst | kubectl apply -f -
          done