name: Pipelines for staging in alex's kubernetes hosting
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  linting:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Restore API and integration tests
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 --run '
            dotnet restore API/API.csproj &&
            dotnet restore IntegrationTests/IntegrationTests.csproj
          '

  unit-tests:
    runs-on: windows-latest
    needs: linting
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore workloads for the app project
        run: dotnet workload restore ResumeApp/ResumeApp.csproj

      - name: Restore MAUI tests
        run: |
          dotnet restore "Maui Tests/Maui Tests.csproj"

      - name: Run MAUI tests
        run: dotnet test "Maui Tests/Maui Tests.csproj" --no-restore

  integration-tests:
    runs-on: self-hosted
    needs: linting
    env:
      INTEGRATION_TEST_NAMESPACE: resumeapp-it-${{ github.run_id }}-${{ github.run_attempt }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword_change_in_ci
      POSTGRES_DB: integrationtestdb
      KUBECONFIG: /home/bishwas/.kube/config
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Create integration test environment
        run: |
          echo "::notice::Integration namespace created: ${INTEGRATION_TEST_NAMESPACE}"
          for file in ./kubernetes/integration-template/*.yml; do
            echo "$file"
            cat "$file" | envsubst | kubectl apply -f -
          done

      - name: Wait for integration PostgreSQL
        run: |
          kubectl rollout status deployment/resumeapp-it-postgres -n ${INTEGRATION_TEST_NAMESPACE} --timeout=300s
          echo "::notice::Integration PostgreSQL is ready"

      - name: Watch integration test progress
        run: |
          POD_ANNOUNCED=0
          RUNNING_ANNOUNCED=0

          while true; do
            SUCCEEDED=$(kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.succeeded}' 2>/dev/null || true)
            FAILED=$(kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.failed}' 2>/dev/null || true)
            ACTIVE=$(kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.active}' 2>/dev/null || true)
            POD_NAME=$(kubectl get pods -n ${INTEGRATION_TEST_NAMESPACE} -l job-name=integration-test-runner -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

            echo "=========================================="
            echo "  Integration Test Progress"
            echo "=========================================="
            echo "  Namespace: ${INTEGRATION_TEST_NAMESPACE}"
            echo "  Active:    ${ACTIVE:-0}"
            echo "  Succeeded: ${SUCCEEDED:-0}"
            echo "  Failed:    ${FAILED:-0}"
            kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o wide || true
            kubectl get pods -n ${INTEGRATION_TEST_NAMESPACE} -o wide || true

            if [ -n "${POD_NAME}" ]; then
              if [ "${POD_ANNOUNCED}" -eq 0 ]; then
                echo "::notice::Integration job pod scheduled: ${POD_NAME}"
                POD_ANNOUNCED=1
              fi

              POD_PHASE=$(kubectl get pod ${POD_NAME} -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.phase}' 2>/dev/null || true)
              echo "  Pod:       ${POD_NAME}"
              echo "  Phase:     ${POD_PHASE:-unknown}"

              if [ "${POD_PHASE}" = "Running" ] && [ "${RUNNING_ANNOUNCED}" -eq 0 ]; then
                echo "::notice::Integration tests are now running"
                RUNNING_ANNOUNCED=1
              fi

              kubectl logs ${POD_NAME} -n ${INTEGRATION_TEST_NAMESPACE} -c xunit-tests --tail=50 || true
            else
              echo "  Pod:       pending creation"
            fi

            if [ "${SUCCEEDED:-0}" != "0" ]; then
              echo "::notice::Integration tests completed"
              break
            fi

            if [ "${FAILED:-0}" != "0" ]; then
              echo "Integration job reported failure."
              exit 1
            fi

            sleep 10
          done

      - name: Show integration test logs on failure
        if: failure()
        run: |
          kubectl get pods -n ${INTEGRATION_TEST_NAMESPACE} -o wide
          kubectl describe job/integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE}
          kubectl logs job/integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} --all-containers=true
          kubectl logs deployment/resumeapp-it-postgres -n ${INTEGRATION_TEST_NAMESPACE} --all-containers=true

      - name: Cleanup integration environment
        if: always()
        run: |
          kubectl delete namespace ${INTEGRATION_TEST_NAMESPACE} --ignore-not-found=true
          echo "Triggered deletion of namespace ${INTEGRATION_TEST_NAMESPACE}"
          kubectl wait --for=delete namespace/${INTEGRATION_TEST_NAMESPACE} --timeout=180s
          echo "::notice::Confirmed deletion of namespace ${INTEGRATION_TEST_NAMESPACE}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "Integration tests failed for Resume APP - Please fix it" ntfy.sh/resume-app-pb

  deploy-on-kubernetes:
    runs-on: self-hosted
    needs: [unit-tests, integration-tests]
    env:
      FEATURES_EMAIL_OTP_DELIVERY: ${{ vars.STAGING_FEATURES_EMAIL_OTP_DELIVERY }}
      AI_SERVICE_BASE_URL: ${{ vars.STAGING_AI_SERVICE_BASEURL }}
      AI_SERVICE_MODEL: ${{ vars.STAGING_AI_SERVICE_MODEL }}
      AI_SERVICE_TIMEOUT_SECONDS: ${{ vars.STAGING_AI_SERVICE_TIMEOUTSECONDS }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
 
      - name: Build and Push to Docker Hub
        run: |
            docker build -t paulawenighofer/resumeapp:$GITHUB_RUN_NUMBER .
            docker push paulawenighofer/resumeapp:$GITHUB_RUN_NUMBER
 
      - name: Apply Namespace
        env:
            KUBECONFIG: /home/bishwas/.kube/config
        run: kubectl apply -f kubernetes/0-namespace.yml

      - name: Create Kubernetes Secret
        env:
            KUBECONFIG: /home/bishwas/.kube/config
        run: |
          kubectl create secret generic resume-app-secrets \
            --namespace=resumeapp \
            --from-literal=ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION }}" \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpirationInMinutes="1" \
            --from-literal=Google__ClientId="${{ secrets.GOOGLE__CLIENTID }}" \
            --from-literal=Google__ClientSecret="${{ secrets.GOOGLE_CLIENTSECRET }}" \
            --from-literal=LinkedIn__ClientId="${{ secrets.LINKEDIN_CLIENTID }}" \
            --from-literal=LinkedIn__ClientSecret="${{ secrets.LINKEDIN_CLIENTSECRET }}" \
            --from-literal=GitHub__ClientId="${{ secrets.GH_CLIENT_ID }}" \
            --from-literal=GitHub__ClientSecret="${{ secrets.GH_CLIENT_SECRET }}" \
            --from-literal=AppScheme="myresumebuilder" \
            --from-literal=ApiBaseUrl="https://resume-app-pb.duckdns.org" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --from-literal=Smtp__Username="${{ secrets.SMTP_USERNAME }}" \
            --from-literal=Smtp__Password="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=AiService__BaseUrl="${AI_SERVICE_BASE_URL}" \
            --from-literal=AiService__ApiKey="${{ secrets.AI_SERVICE_APIKEY }}" \
            --from-literal=AiService__Model="${AI_SERVICE_MODEL}" \
            --from-literal=AiService__TimeoutSeconds="${AI_SERVICE_TIMEOUT_SECONDS:-1200}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Manifests
        env:
            KUBECONFIG: /home/bishwas/.kube/config
        run: |
          for file in ./kubernetes/*.yml; do
            echo "$file"
            cat "$file" | envsubst | kubectl apply -f -
          done

      - name: Update grafana dashboard configmap
        env:
            KUBECONFIG: /home/bishwas/.kube/config
        run: |
          kubectl delete -n resumeapp configmap grafana-dashboard-config-configmap || true
          kubectl create -n resumeapp configmap grafana-dashboard-config-configmap --from-file=configs/grafana-dashboard.json

      - name: Restart observability pods to pick up new configmaps
        env:
            KUBECONFIG: /home/bishwas/.kube/config
        run: |
          kubectl rollout restart deployment/grafana -n resumeapp
          kubectl rollout restart deployment/otel-collector -n resumeapp

      - name: Run on failure
        if: failure()
        run: |
          curl -d "App Deployment Failed for Resume APP - Please fix it" ntfy.sh/resume-app-pb
