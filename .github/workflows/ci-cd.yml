name: Pipelines for staging in alex's kubernetes hosting
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  linting:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Restore API and integration tests
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 --run '
            dotnet restore API/API.csproj &&
            dotnet restore ResumeApp.Web/ResumeApp.Web.csproj &&
            dotnet restore IntegrationTests/IntegrationTests.csproj
          '

      - name: Build (warnings as errors)
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 --run '
            dotnet build API/API.csproj --no-restore -warnaserror &&
            dotnet build ResumeApp.Web/ResumeApp.Web.csproj --no-restore -warnaserror &&
            dotnet build IntegrationTests/IntegrationTests.csproj --no-restore -warnaserror
          '

  unit-tests:
    runs-on: self-hosted
    needs: linting
    steps:
      - name: MAUI Tests
        run: |
          nix-shell -p dotnetCorePackages.sdk_9_0 \
           --run "dotnet test 'Maui Tests/Maui Tests.csproj' -p:MauiTestBuild=true"


  integration-tests:
    runs-on: self-hosted
    needs: linting
    env:
      INTEGRATION_TEST_NAMESPACE: resumeapp-it-${{ github.run_id }}-${{ github.run_attempt }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      POSTGRES_DB: integrationtestdb
      KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Create integration test environment
        run: |
          echo "::notice::Integration namespace created: ${INTEGRATION_TEST_NAMESPACE}"
          for file in ./kubernetes/integration-template/*.yml; do
            echo "$file"
            cat "$file" | envsubst | kubectl apply -f -
          done

      - name: Wait for integration PostgreSQL
        run: |
          kubectl wait deployment/resumeapp-it-postgres -n ${INTEGRATION_TEST_NAMESPACE} --for=condition=Available=True --timeout=300s
          echo "::notice::Integration PostgreSQL is ready"

      - name: Watch integration test progress
        run: |
          POD_ANNOUNCED=0
          RUNNING_ANNOUNCED=0

          while true; do
            SUCCEEDED=$(kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.succeeded}' 2>/dev/null || true)
            FAILED=$(kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.failed}' 2>/dev/null || true)
            ACTIVE=$(kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.active}' 2>/dev/null || true)
            POD_NAME=$(kubectl get pods -n ${INTEGRATION_TEST_NAMESPACE} -l job-name=integration-test-runner -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

            echo "=========================================="
            echo "  Integration Test Progress"
            echo "=========================================="
            echo "  Namespace: ${INTEGRATION_TEST_NAMESPACE}"
            echo "  Active:    ${ACTIVE:-0}"
            echo "  Succeeded: ${SUCCEEDED:-0}"
            echo "  Failed:    ${FAILED:-0}"
            kubectl get job integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} -o wide || true
            kubectl get pods -n ${INTEGRATION_TEST_NAMESPACE} -o wide || true

            if [ -n "${POD_NAME}" ]; then
              if [ "${POD_ANNOUNCED}" -eq 0 ]; then
                echo "::notice::Integration job pod scheduled: ${POD_NAME}"
                POD_ANNOUNCED=1
              fi

              POD_PHASE=$(kubectl get pod ${POD_NAME} -n ${INTEGRATION_TEST_NAMESPACE} -o jsonpath='{.status.phase}' 2>/dev/null || true)
              echo "  Pod:       ${POD_NAME}"
              echo "  Phase:     ${POD_PHASE:-unknown}"

              if [ "${POD_PHASE}" = "Running" ] && [ "${RUNNING_ANNOUNCED}" -eq 0 ]; then
                echo "::notice::Integration tests are now running"
                RUNNING_ANNOUNCED=1
              fi

              kubectl logs ${POD_NAME} -n ${INTEGRATION_TEST_NAMESPACE} -c xunit-tests --tail=50 || true
            else
              echo "  Pod:       pending creation"
            fi

            if [ "${SUCCEEDED:-0}" != "0" ]; then
              echo "::notice::Integration tests completed"
              break
            fi

            if [ "${FAILED:-0}" != "0" ]; then
              echo "Integration job reported failure."
              exit 1
            fi

            sleep 10
          done

      - name: Show integration test logs on failure
        if: failure()
        run: |
          kubectl get pods -n ${INTEGRATION_TEST_NAMESPACE} -o wide
          kubectl describe job/integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE}
          kubectl logs job/integration-test-runner -n ${INTEGRATION_TEST_NAMESPACE} --all-containers=true
          kubectl logs deployment/resumeapp-it-postgres -n ${INTEGRATION_TEST_NAMESPACE} --all-containers=true

      - name: Cleanup integration environment
        if: always()
        run: |
          kubectl delete namespace ${INTEGRATION_TEST_NAMESPACE} --ignore-not-found=true
          echo "Triggered deletion of namespace ${INTEGRATION_TEST_NAMESPACE}"
          kubectl wait --for=delete namespace/${INTEGRATION_TEST_NAMESPACE} --timeout=180s
          echo "::notice::Confirmed deletion of namespace ${INTEGRATION_TEST_NAMESPACE}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "Integration tests failed for Resume APP - Please fix it" ${{ vars.STAGING_NTFY_TOPIC_URL }}

  deploy-on-kubernetes:
    runs-on: self-hosted
    needs: [unit-tests, integration-tests]
    env:
      FEATURES_EMAIL_OTP_DELIVERY: ${{ vars.STAGING_FEATURES_EMAIL_OTP_DELIVERY }}
      AI_SERVICE_BASE_URL: ${{ vars.STAGING_AI_SERVICE_BASEURL }}
      AI_SERVICE_MODEL: ${{ vars.STAGING_AI_SERVICE_MODEL }}
      AI_SERVICE_TIMEOUT_SECONDS: ${{ vars.STAGING_AI_SERVICE_TIMEOUTSECONDS }}
      STAGING_APP_DOMAIN: ${{ vars.STAGING_APP_DOMAIN }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
 
      - name: Build and Push to Docker Hub
        run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/resumeapp:$GITHUB_RUN_NUMBER .
            docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp:$GITHUB_RUN_NUMBER

      - name: Build and Push Web to Docker Hub
        run: |
            docker build -f Dockerfile.web -t ${{ secrets.DOCKER_USERNAME }}/resumeapp-web:$GITHUB_RUN_NUMBER .
            docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp-web:$GITHUB_RUN_NUMBER

      - name: Apply Namespace
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: kubectl apply -f kubernetes/0-namespace.yml

      - name: Create Kubernetes Secret
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: |
          kubectl create secret generic resume-app-secrets \
            --namespace=resumeapp \
            --from-literal=ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION }}" \
            --from-literal=Jwt__Key="${{ secrets.JWT_KEY }}" \
            --from-literal=Jwt__Issuer="${{ secrets.JWT_ISSUER }}" \
            --from-literal=Jwt__Audience="${{ secrets.JWT_AUDIENCE }}" \
            --from-literal=Jwt__ExpirationInMinutes="${{ vars.STAGING_JWT_EXPIRATION_MINUTES }}" \
            --from-literal=Google__ClientId="${{ secrets.GOOGLE__CLIENTID }}" \
            --from-literal=Google__ClientSecret="${{ secrets.GOOGLE__CLIENTSECRET }}" \
            --from-literal=LinkedIn__ClientId="${{ secrets.LINKEDIN__CLIENTID }}" \
            --from-literal=LinkedIn__ClientSecret="${{ secrets.LINKEDIN__CLIENTSECRET }}" \
            --from-literal=GitHub__ClientId="${{ secrets.GH_CLIENT_ID }}" \
            --from-literal=GitHub__ClientSecret="${{ secrets.GH_CLIENT_SECRET }}" \
            --from-literal=AppScheme="${{ vars.STAGING_APP_SCHEME }}" \
            --from-literal=ApiBaseUrl="https://${{ vars.STAGING_APP_DOMAIN }}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --from-literal=Smtp__Username="${{ secrets.SMTP_USERNAME }}" \
            --from-literal=Smtp__Password="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=AzureBlob__ConnectionString="${{ secrets.AZURE_BLOB_CONNECTION_STRING }}" \
            --from-literal=AzureBlob__ProfileImagesContainer="${{ vars.STAGING_AZURE_BLOB_PROFILES_CONTAINER }}" \
            --from-literal=AzureBlob__ProfileImagesBasePath="${{ vars.STAGING_AZURE_BLOB_PROFILES_BASE_PATH }}" \
            --from-literal=AiService__BaseUrl="${AI_SERVICE_BASE_URL}" \
            --from-literal=AiService__ApiKey="${{ secrets.AI_SERVICE_APIKEY }}" \
            --from-literal=AiService__Model="${AI_SERVICE_MODEL}" \
            --from-literal=AiService__TimeoutSeconds="${AI_SERVICE_TIMEOUT_SECONDS:-1200}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy base manifests
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: |
          for file in ./kubernetes/*.yml; do
            case "$(basename "$file")" in
              4-api-deployment.yml|21-web-deployment.yml)
                continue
                ;;
            esac
            echo "$file"
            cat "$file" | envsubst | kubectl apply -f -
          done

      - name: Update grafana dashboard configmap
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: |
          kubectl create configmap grafana-dashboard-config-configmap \
            --from-file=configs/grafana-dashboard.json \
            -n resumeapp \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Measure staging API deployment downtime
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: |
          ARTIFACT_DIR="${RUNNER_TEMP}/deployment-observability/staging-api"
          RAW_K6_LOG="${ARTIFACT_DIR}/resumeapp-api-k6-raw.ndjson"
          PROCESSED_K6_LOG="${ARTIFACT_DIR}/resumeapp-api-k6-events.ndjson"
          SUMMARY_JSON="${ARTIFACT_DIR}/resumeapp-api-deployment-summary.json"
          DEPLOYMENT_ID="staging-${GITHUB_RUN_NUMBER}-${GITHUB_SHA}"
          TARGET_URL="https://${STAGING_APP_DOMAIN}/health/ready"
          LOKI_PORT=3111

          mkdir -p "${ARTIFACT_DIR}"

          set +e
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TARGET_URL="${TARGET_URL}" \
            -e DEPLOYMENT_ID="${DEPLOYMENT_ID}" \
            -e ENVIRONMENT="staging" \
            -e SERVICE_NAME="resumeapp-api" \
            -e WORKFLOW_NAME="${GITHUB_WORKFLOW}" \
            -e RUN_ID="${GITHUB_RUN_ID}" \
            -e PROBE_INTERVAL_MS="100" \
            -e MAX_DURATION="10m" \
            grafana/k6:0.49.0 run --quiet --no-summary --log-format=raw /work/scripts/observability/deployment-uptime.js \
            > "${RAW_K6_LOG}" 2>&1 &
          K6_PID=$!

          sleep 2

          cat kubernetes/4-api-deployment.yml | envsubst | kubectl apply -f -
          kubectl wait deployment/resumeapp-api -n resumeapp --for=condition=Available=True --timeout=300s
          ROLLOUT_STATUS=$?

          kill -TERM ${K6_PID} 2>/dev/null || true
          wait ${K6_PID} 2>/dev/null
          K6_STATUS=$?
          set -e

          echo "k6 exit code: ${K6_STATUS}"

          kubectl port-forward svc/loki-service "${LOKI_PORT}:3100" -n resumeapp > "${ARTIFACT_DIR}/loki-port-forward.log" 2>&1 &
          PORT_FORWARD_PID=$!
          sleep 5

          set +e
          nix-shell -p python3 --run "python3 scripts/observability/prepare_and_push_deployment_logs.py --input '${RAW_K6_LOG}' --output '${PROCESSED_K6_LOG}' --summary-output '${SUMMARY_JSON}' --deployment-id '${DEPLOYMENT_ID}' --environment 'staging' --service 'resumeapp-api' --workflow '${GITHUB_WORKFLOW}' --run-id '${GITHUB_RUN_ID}' --target-url '${TARGET_URL}' --probe-interval-ms 100 --loki-url 'http://127.0.0.1:${LOKI_PORT}/loki/api/v1/push'"
          PREP_STATUS=$?
          kill -TERM ${PORT_FORWARD_PID} 2>/dev/null || true
          wait ${PORT_FORWARD_PID} 2>/dev/null || true
          set -e

          if [ ${PREP_STATUS} -ne 0 ]; then
            echo "::warning::Failed to process or push staging deployment downtime logs to Loki."
          fi

          if [ -f "${SUMMARY_JSON}" ]; then
            cat "${SUMMARY_JSON}"
          fi

          if [ ${ROLLOUT_STATUS} -ne 0 ]; then
            exit ${ROLLOUT_STATUS}
          fi

      - name: Upload staging API deployment observability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-api-deployment-observability-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/deployment-observability/staging-api/resumeapp-api-k6-raw.ndjson
            ${{ runner.temp }}/deployment-observability/staging-api/resumeapp-api-k6-events.ndjson
            ${{ runner.temp }}/deployment-observability/staging-api/resumeapp-api-deployment-summary.json
            ${{ runner.temp }}/deployment-observability/staging-api/loki-port-forward.log

      - name: Deploy Web rollout
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: |
          cat kubernetes/21-web-deployment.yml | envsubst | kubectl apply -f -
          kubectl wait deployment/resumeapp-web -n resumeapp --for=condition=Available=True --timeout=300s

      - name: Restart observability pods to pick up new configmaps
        env:
            KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
        run: |
          kubectl rollout restart deployment/prometheus -n resumeapp
          kubectl rollout restart deployment/grafana -n resumeapp
          kubectl rollout restart deployment/otel-collector -n resumeapp

      - name: Run on failure
        if: failure()
        run: |
          curl -d "App Deployment Failed for Resume APP - Please fix it" ${{ vars.STAGING_NTFY_TOPIC_URL }}
