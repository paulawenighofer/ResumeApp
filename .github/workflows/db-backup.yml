name: Postgres Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    name: Dump and store Postgres backup
    runs-on: self-hosted

    env:
      KUBECONFIG: ${{ vars.STAGING_RUNNER_KUBECONFIG }}
      BACKUP_DIR: ${{ vars.STAGING_RUNNER_BACKUP_DIR }}
      RETENTION_COUNT: 4
      KUBERNETES_NAMESPACE: resumeapp
      KUBERNETES_DEPLOYMENT: resumeapp-postgres

    steps:
      - name: Verify postgres deployment is available
        run: |
          kubectl rollout status deployment/${{ env.KUBERNETES_DEPLOYMENT }} \
            -n ${{ env.KUBERNETES_NAMESPACE }} \
            --timeout=60s

      - name: Ensure backup directory exists
        run: |
          mkdir -p ${{ env.BACKUP_DIR }}
          chmod 700 ${{ env.BACKUP_DIR }}

      - name: Run pg_dump inside the postgres pod
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          BACKUP_FILE="${{ env.BACKUP_DIR }}/backup-${TIMESTAMP}.sql"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "$GITHUB_ENV"

          # Credentials are resolved inside the pod from resume-app-secrets, not on the runner.
          kubectl exec deployment/${{ env.KUBERNETES_DEPLOYMENT }} \
            -n ${{ env.KUBERNETES_NAMESPACE }} \
            -i -- \
            /bin/sh -c \
            'PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
            > "${BACKUP_FILE}"

          # Guard against pg_dump succeeding with no output.
          if [ ! -s "${BACKUP_FILE}" ]; then
            echo "ERROR: Backup file is empty."
            rm -f "${BACKUP_FILE}"
            exit 1
          fi

          echo "Saved: ${BACKUP_FILE} ($(wc -c < "${BACKUP_FILE}") bytes)"

      - name: Rotate old backups (keep ${{ env.RETENTION_COUNT }} most recent)
        run: |
          # Timestamp-based names sort lexicographically = chronologically.
          find ${{ env.BACKUP_DIR }} -maxdepth 1 -name 'backup-*.sql' \
            | sort \
            | head -n -${{ env.RETENTION_COUNT }} \
            | xargs -r rm -v

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "Postgres backup FAILED for ResumeApp — check GitHub Actions." \
            ${{ vars.STAGING_NTFY_TOPIC_URL }}
