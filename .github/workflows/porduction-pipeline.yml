name: Pipeline for Building
on:
  push:
    branches:
        - production
  workflow_dispatch:

jobs:
  build-and-deploy-on-azure:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/resumeapp-prod:${{ github.run_number }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp-prod:${{ github.run_number }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/resumeapp-prod:${{ github.run_number }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "Production Deployment on Azure Failed for Resume APP - Please fix it" ntfy.sh/resume-app-pb
