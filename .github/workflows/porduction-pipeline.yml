name: Pipeline for Building
on:
  push:
    branches:
        - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/resumeapp:${{ github.run_number }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/resumeapp:${{ github.run_number }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/resumeapp:${{ github.run_number }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -d "Production Deployment Failed for Resume APP - Please fix it" ntfy.sh/resume-app-pb
