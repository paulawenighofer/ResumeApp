receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: detailed
  
  otlphttp:
    endpoint: http://loki:3100/otlp

  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: []
      exporters: [debug, otlphttp]

    metrics:
      receivers: [otlp]
      processors: []
      exporters: [debug, prometheus]